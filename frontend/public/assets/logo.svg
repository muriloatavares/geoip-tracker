<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradPin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"></stop>
      <stop offset="100%" stop-color="#8a2be2"></stop>
    </linearGradient>

    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#b388ff"></stop>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Location Pin -->
  <path d="M70 20
           C40 20 20 40 20 70
           C20 100 70 130 70 130
           C70 130 120 100 120 70
           C120 40 100 20 70 20 Z" fill="url(#gradPin)" filter="url(#glow)"></path>

  <!-- Globe -->
  <circle cx="70" cy="65" r="20" fill="none" stroke="#ffffff" stroke-width="2"></circle>
  <line x1="50" y1="65" x2="90" y2="65" stroke="#ffffff" stroke-width="1"></line>
  <line x1="70" y1="45" x2="70" y2="85" stroke="#ffffff" stroke-width="1"></line>
  <ellipse cx="70" cy="65" rx="12" ry="20" fill="none" stroke="#ffffff" stroke-width="1"></ellipse>

  <!-- Text -->
  <text x="150" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="url(#gradText)">
    GeoIP
  </text>

  <text x="150" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#8a2be2">
    Tracker
  </text>
</svg>
